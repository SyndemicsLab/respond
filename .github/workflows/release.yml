name: Release Project

on:
    push:
        tags:
            - "v*.*.*"
env:
    BUILD_TYPE: Release

jobs:
    build_deb:
        name: Building Linux Packages
        runs-on: ${{matrix.os}}
        defaults:
            run:
                shell: bash
        strategy:
            matrix:
                os: [ubuntu-latest, ubuntu-24.04-arm]
                build-variant: [shared, static]
                package-type: [debian, rpm]
                include:
                    - package-type: debian
                      extension: deb
                    - package-type: rpm
                      extension: rpm
        steps:
            - name: Checkout Respond Repository
              uses: actions/checkout@v6
            - name: Run CMake
              run: |
                  cmake --preset package-${{matrix.build-variant}} && cmake --build --preset package-${{matrix.build-variant}}
            - name: Run CPack
              run: |
                  cpack --preset ${{matrix.package-type}}-${{matrix.build-variant}}

            - name: Upload Linux Package to Release
              uses: svenstaro/upload-release-action@v2
              with:
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  file: ${{ github.workspace }}/build/${{ matrix.build-variant }}/*.${{ matrix.extension }}
                  file_glob: true
                  tag: ${{ github.ref }}

name: Respond Unit Testing
# Schema: https://json.schemastore.org/github-action.json

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    unit-testing:
        name: Testing ${{matrix.os}} ${{matrix.build-variant}} build
        runs-on: ${{matrix.os}}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                build-variant: [shared, static]
        steps:
            - name: Checkout Respond Repository
              uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

            - name: Install Eigen3
              uses: kupns-aka-kupa/setup-eigen3@master
              id: install-eigen3
              with:
                  version: 3.4.0
              env:
                  CMAKE_GENERATOR: Ninja

            - name: Install MinGW
              if: matrix.os == 'windows-latest'
              uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64

            - name: Configure Project
              env:
                  EIGEN3_INCLUDE_DIR: ${{ steps.install-eigen3.outputs.EIGEN3_INCLUDE_DIR }}
                  EIGEN3_DIR: ${{ steps.install-eigen3.outputs.EIGEN3_DIR}}
              run: |
                  if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
                      echo "Building Linux"
                      cmake --preset debug-linux-${{matrix.build-variant}}-config
                  elif [ "${{ matrix.os}}" == "windows-latest" ]; then
                      echo "Building Windows"
                      if [ "${{ matrix.build-variant }}" == "shared" ]; then
                          echo "Disabling coverage for windows shared build to avoid hanging tests"
                          cmake --preset debug-microsoft-shared-config -DRESPOND_CALCULATE_COVERAGE=OFF
                      else
                          cmake --preset debug-microsoft-static-config
                      fi
                  fi
              shell: bash

            - name: List directory contents after potential error
              run: |
                  echo "Listing contents of current directory:"
                  ls -laR build/ # Lists all files and directories recursively
              shell: bash

            - name: Run Testing Workflow
              run: |
                  if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
                      echo "Testing Linux"
                      cmake --workflow --preset test-debug-linux-${{matrix.build-variant}}-workflow
                  elif [ "${{ matrix.os }}" == "windows-latest" ]; then
                      echo "Testing Microsoft"
                      cmake --build --preset debug-microsoft-${{matrix.build-variant}}-build

                      if [ "${{ matrix.build-variant }}" == "shared" ]; then
                          echo "Windows shared diagnostics: direct gtest process run"
                          timeout 180s ./build/shared/bin/respond_tests.exe --gtest_filter=BackgroundDeathTest.NoTransitionMatrices --gtest_also_run_disabled_tests

                          echo "Windows shared diagnostics: same test via CTest"
                          timeout 300s ctest --preset debug-microsoft-shared-test -R "^BackgroundDeathTest\\.NoTransitionMatrices$" -VV --output-on-failure

                          echo "Windows shared diagnostics: full suite via CTest"
                          timeout 900s ctest --preset debug-microsoft-shared-test --output-on-failure -VV
                      else
                          ctest --preset debug-microsoft-${{matrix.build-variant}}-test --output-on-failure
                      fi
                  fi
              timeout-minutes: 15
              shell: bash
